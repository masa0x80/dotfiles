[settings]
idiomatic_version_file_enable_tools = ["node"]
install_before = "7d"

[settings.node]
gpg_verify = false

[tools]
# https://app-updates.agilebits.com/product_history/CLI2
1password-cli = "2.33.1"

# https://github.com/rhysd/actionlint/releases
actionlint = "1.7.12"

# https://github.com/aws/aws-cli/releases
awscli = { version = "2.34.25", symlink_bins = "true" }
# https://github.com/aws/aws-sam-cli/releases
aws-sam-cli = "1.157.1"
# https://github.com/99designs/aws-vault/releases
aws-vault = "7.2.0"

# https://github.com/cli/cli/releases
gh = "2.89.0"

# https://go.dev/dl/
go = "1.26.1"

# https://github.com/corretto/corretto-21/releases
java = "corretto-21.0.4.7.1"

# https://gradle.org/install/
gradle = "9.4.0"
# https://groovy.apache.org/download.html
groovy = "5.0.5"

# https://github.com/jqlang/jq/releases
jq = "1.8.1"

# https://github.com/evilmartians/lefthook/releases
lefthook = "2.1.4"

# https://github.com/neovim/neovim/releases
neovim = "0.11.6"

# https://nodejs.org/en/download
node = "25.9.0"
# https://github.com/denoland/deno/releases
deno = "2.7.11"

# https://www.python.org/downloads/
python = "3.14.3"
# https://github.com/astral-sh/uv/releases
uv = "0.11.6"

# https://www.ruby-lang.org/en/downloads/releases/
ruby = "4.0.2"

# https://github.com/rust-lang/rust/releases
rust = "1.94.1"

# https://github.com/getsops/sops/releases
sops = "v3.12.2"

# https://github.com/hashicorp/terraform/releases
terraform = "1.14.8"
# https://github.com/terraform-docs/terraform-docs/releases
terraform-docs = "0.21.0"

# https://github.com/tree-sitter/tree-sitter/releases
tree-sitter = "0.26.8"
